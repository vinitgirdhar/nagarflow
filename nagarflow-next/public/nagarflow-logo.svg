  <!-- City buildings (silhouette) -->
  <rect x="13" y="26" width="4" height="12" fill="#C1440E" rx="0.5"/>
  <rect x="19" y="20" width="4" height="18" fill="#C1440E" rx="0.5"/>
  <rect x="25" y="23" width="4" height="15" fill="#C1440E" rx="0.5"/>
